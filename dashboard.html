<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker - Dashboard</title>
  <link rel="stylesheet" href="/src/styles/dashboard.css" />
</head>
<body>
  <div id="dashboard">
    <header>
      <h1>Time Tracker Dashboard</h1>
      <div id="date-filter">
        <input type="date" id="date-from" />
        <span>至</span>
        <input type="date" id="date-to" />
        <button id="btn-refresh">刷新</button>
      </div>
    </header>

    <section id="theme-bar">
      <label>配色方案</label>
      <div id="theme-options">
        <button class="theme-chip active" data-theme="stellar">
          <span class="theme-dot" style="background:#7880B0"></span>星辉
        </button>
        <button class="theme-chip" data-theme="ember">
          <span class="theme-dot" style="background:#C09870"></span>余烬
        </button>
        <button class="theme-chip" data-theme="verdant">
          <span class="theme-dot" style="background:#80A078"></span>青翠
        </button>
        <button class="theme-chip" data-theme="nocturne">
          <span class="theme-dot" style="background:#A088B8"></span>夜曲
        </button>
      </div>
    </section>

    <section id="summary-cards">
      <div class="card" id="card-today">
        <span class="card-label">今日</span>
        <span class="card-value">--</span>
      </div>
      <div class="card" id="card-week">
        <span class="card-label">本周</span>
        <span class="card-value">--</span>
      </div>
      <div class="card" id="card-month">
        <span class="card-label">本月</span>
        <span class="card-value">--</span>
      </div>
    </section>

    <section id="charts-row">
      <div class="chart-container">
        <h3>每日时长趋势</h3>
        <canvas id="chart-daily"></canvas>
      </div>
      <div class="chart-container">
        <h3>分类占比</h3>
        <canvas id="chart-category"></canvas>
      </div>
    </section>

    <section id="sessions-section">
      <div class="section-header">
        <h3>计时记录</h3>
        <div>
          <button id="btn-edit-config">编辑分类</button>
          <button id="btn-export">导出 CSV</button>
        </div>
      </div>
      <div id="config-editor" style="display:none">
        <div id="category-editor"></div>
        <button id="btn-add-category" class="btn-add-category">+ 添加分类</button>
        <div class="config-editor-buttons">
          <button id="btn-save-config">保存配置</button>
          <button id="btn-cancel-config">取消</button>
        </div>
        <div id="config-error" class="error-msg"></div>
      </div>
      <table id="sessions-table">
        <thead>
          <tr>
            <th>日期</th>
            <th>分类</th>
            <th>任务</th>
            <th>开始</th>
            <th>结束</th>
            <th>时长</th>
          </tr>
        </thead>
        <tbody id="sessions-tbody"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none">
        暂无计时记录
      </div>
    </section>
  </div>

  <script type="module" src="/src/js/dashboard.js"></script>
</body>
</html>
